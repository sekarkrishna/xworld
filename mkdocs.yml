site_name: XWorld Research Log
site_description: Cross-domain time series shape clustering — does a glacier melting and a turtle breathing share the same numerical signature?
docs_dir: notebooks
copyright: <a href="https://www.linkedin.com/in/sekarkrishna/" target="_blank">Krishnamoorthy Sankaran</a> &copy; 2026

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Findings: FINDINGS.md
  - Milestones: MILESTONES.md
  - Experiments: EXPERIMENTS.md
  - Decisions: DECISIONS.md
