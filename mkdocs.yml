site_name: XWorld Research Log
site_description: Cross-domain time series shape clustering — does a glacier melting and a turtle breathing share the same numerical signature?
docs_dir: notebooks

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Findings: FINDINGS.md
  - Milestones: MILESTONES.md
  - Experiments: EXPERIMENTS.md
  - Decisions: DECISIONS.md
  - Sessions:
      - "25 Apr 2026 (nb29-31)": summary_25APR2026_nb29-31.md
      - "19 Apr 2026 (nb28)": summary_19APR2026_nb28.md
      - "19 Apr 2026 (nb27)": summary_19APR2026_nb27.md
      - "19 Apr 2026 (nb26)": summary_19APR2026_nb26.md
      - "19 Apr 2026 (nb25)": summary_19APR2026_nb25.md
      - "19 Apr 2026 (nb24)": summary_19APR2026_nb24.md
      - "19 Apr 2026 (nb22)": summary_19APR2026_nb22.md
      - "19 Apr 2026 (nb23)": summary_19APR2026_nb23.md
      - "19 Apr 2026 (theoretical)": summary_19APR2026.md
      - "30 Mar 2026 (nb20)": summary_30MAR2026_nb20.md
      - "30 Mar 2026": summary_30MAR2026.md
      - "28 Mar 2026": summary_28MAR2026.md
      - "24 Mar 2026": summary_24MAR2026.md